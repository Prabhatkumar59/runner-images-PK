name: Verify Zstd on Windows Runner

on: [push, pull_request]

jobs:
  test-windows-zstd:
    runs-on: windows-latest  # Adjust if needed: windows-2019, windows-2022

    steps:
      - name: Check if Zstd is Installed
        id: check-zstd
        shell: pwsh
        run: |
          if (Get-Command zstd -ErrorAction SilentlyContinue) {
            Write-Output "✅ Zstd is installed"
            zstd -V
          } else {
            Write-Output "❌ Zstd is NOT installed. Installing now..."
            echo "ZSTD_MISSING=true" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

      - name: Install Zstd if Missing
        if: env.ZSTD_MISSING == 'true'
        shell: pwsh
        run: |
          choco install zstd -y
          Write-Output "✅ Zstd Installed Successfully"

      - name: Verify Zstd Installation
        shell: pwsh
        run: |
          if (Get-Command zstd -ErrorAction SilentlyContinue) {
            Write-Output "✅ Zstd is now installed"
            zstd -V
          } else {
            Write-Output "❌ Zstd installation failed"
            exit 1
          }

      - name: Run Only Zstd Test from Tools.Tests.ps1
        shell: pwsh
        run: |
          Write-Output "⚙️ Running only Zstd test..."
          $tests = Invoke-Pester -Script C:\image\tests\Tools.Tests.ps1 -PassThru
          if ($tests.FailedCount -gt 0) {
            Write-Output "❌ Some tests failed"
            exit 1
          } else {
            Write-Output "✅ All Zstd tests passed"
          }
